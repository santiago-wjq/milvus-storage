name: Python Release to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string
      publish_target:
        description: 'Publish target'
        required: true
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi
      skip_tests:
        description: 'Skip tests before release'
        required: false
        type: boolean
        default: false

  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

env:
  CONAN_VERSION: "1.61.0"

jobs:
  # Build wheel for Linux x86_64
  build-linux-x86_64:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install C++ dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake patchelf
          pip install conan==${{ env.CONAN_VERSION }}

      - name: Setup Conan remote
        run: |
          conan remote add default-conan-local https://milvus01.jfrog.io/artifactory/api/conan/default-conan-local --insert || true
          conan remote list

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan
          key: conan-linux-x86_64-${{ hashFiles('./cpp/conanfile.py') }}
          restore-keys: conan-linux-x86_64-

      - name: Build C++ library for Python
        working-directory: ./cpp
        run: |
          make python-lib

      - name: Copy shared library to Python package
        run: |
          mkdir -p python/milvus_storage/lib
          # Find and copy the library (it may be in different locations depending on conan version)
          LIBPATH=$(find cpp/build -name "libmilvus-storage.so" -type f | head -1)
          if [ -z "$LIBPATH" ]; then
            echo "ERROR: libmilvus-storage.so not found!"
            find cpp/build -name "*.so" -type f
            exit 1
          fi
          echo "Found library at: $LIBPATH"
          cp "$LIBPATH" python/milvus_storage/lib/

      - name: Set version
        working-directory: ./python
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          sed -i "s/version = \".*\"/version = \"${VERSION}\"/" pyproject.toml
          echo "Set version to ${VERSION}"
          cat pyproject.toml | grep "version"

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel auditwheel

      - name: Build wheel
        working-directory: ./python
        run: |
          python -m build --wheel

      - name: Repair wheel with auditwheel
        working-directory: ./python
        run: |
          auditwheel repair dist/*.whl -w dist/
          rm dist/*-linux_x86_64.whl || true

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x86_64
          path: python/dist/*.whl

  # Build source distribution
  build-sdist:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set version
        working-directory: ./python
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          sed -i "s/version = \".*\"/version = \"${VERSION}\"/" pyproject.toml
          echo "Set version to ${VERSION}"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build source distribution
        working-directory: ./python
        run: |
          python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/dist/*.tar.gz

  # Test the built wheels
  test-wheels:
    needs: [build-linux-x86_64]
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel-linux-x86_64
          path: dist/

      - name: Install wheel
        run: |
          pip install dist/*.whl

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov

      - name: Run tests
        working-directory: ./python
        run: |
          pytest tests/ -v --tb=short

  # Publish to PyPI or TestPyPI
  publish:
    needs: [build-linux-x86_64, build-sdist, test-wheels]
    if: |
      always() &&
      (needs.build-linux-x86_64.result == 'success') &&
      (needs.build-sdist.result == 'success') &&
      (needs.test-wheels.result == 'success' || github.event.inputs.skip_tests == 'true')
    runs-on: ubuntu-22.04
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target || 'pypi' }}
      url: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target == 'testpypi' && 'https://test.pypi.org/project/milvus-storage/' || 'https://pypi.org/project/milvus-storage/' }}
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List distribution files
        run: |
          ls -la dist/

      - name: Publish to TestPyPI
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target == 'testpypi' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target == 'pypi') }}
        uses: pypa/gh-action-pypi-publish@release/v1
